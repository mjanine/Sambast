<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventory</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../static/css/admin/inventory.css">
</head>

<body>

    <header class="header">
        <div class="logo">LOGO</div>
        <div class="menu" id="menuBtn">&#9776;</div>
    </header>

    <!-- Overlay -->
    <div id="overlay"></div>

    <!-- Sidebar -->
    <div class="sidebar" id="sidebar">

        <div class="close-btn" id="closeBtn">✕</div>

        <div class="sidebar-menu">
            <ul class="nav-links">
                <li><a href="profile.html">PROFILE</a></li>
                <li><a href="orders.html">ORDERS</a></li>
                <li class="active"><a href="inventory.html">INVENTORY</a></li>
                <li><a href="audit-logs.html">AUDIT LOGS</a></li>
                <li><a href="analytics.html">ANALYTICS</a></li>
            </ul>
        </div>

        <!-- LOGOUT BUTTON -->
        <div class="logout-container">
            <a href="logout.html" class="logout-btn">LOG-OUT</a>
        </div>

    </div>

    <section class="inventory">

        <div class="inventory-header">
            <h1>INVENTORY</h1>
            <button class="add-btn" id="addProductBtn">+ Add Product</button>
        </div>

        <!-- SEARCH BAR -->
        <div class="search-box">
            <input type="text" placeholder="Search Product">
            
            <svg class="search-mag" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="11" cy="11" r="8"/>
                <path d="m21 21-4.3-4.3"/>
            </svg>
        </div>

        <!-- INVENTORY CARDS -->
        <div class="inventory-card">
            <div class="card-header">
                <strong>PRODUCT NAME</strong>
                <span class="icons">
                    <button class="edit">
                        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M12 20h9"/>
                            <path d="M16.5 3.5a2.1 2.1 0 1 1 3 3L7 19l-4 1 1-4 12.5-12.5z"/>
                        </svg>
                    </button>

                    <button class="delete">
                        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
                            <polyline points="3 6 5 6 21 6"/>
                            <path d="M19 6l-1 14H6L5 6"/>
                            <path d="M10 11v6"/>
                            <path d="M14 11v6"/>
                            <path d="M9 6V4h6v2"/>
                        </svg>
                    </button>
                </span>
            </div>

            <div class="card-body">
                <div>CATEGORY</div>
                <div>STOCK</div>
                <div>RESERVED</div>
                <div>AVAILABLE</div>
                <div>PRICE</div>
            </div>
        </div>

        <div class="inventory-card">
            <div class="card-header">
                <strong>PRODUCT NAME</strong>
                <span class="icons">
                    <button class="edit">
                        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M12 20h9"/>
                            <path d="M16.5 3.5a2.1 2.1 0 1 1 3 3L7 19l-4 1 1-4 12.5-12.5z"/>
                        </svg>
                    </button>

                    <button class="delete">
                        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
                            <polyline points="3 6 5 6 21 6"/>
                            <path d="M19 6l-1 14H6L5 6"/>
                            <path d="M10 11v6"/>
                            <path d="M14 11v6"/>
                            <path d="M9 6V4h6v2"/>
                        </svg>
                    </button>
                </span>
            </div>

            <div class="card-body">
                <div>CATEGORY</div>
                <div>STOCK</div>
                <div>RESERVED</div>
                <div>AVAILABLE</div>
                <div>PRICE</div>
            </div>
        </div>

    </section>

    <!-- ADD PRODUCT MODAL -->
    <div class="modal" id="addProductModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Add Product</h2>
                <span class="close" id="closeModal">✕</span>
            </div>

            <div class="modal-body">

                <label>Product Image</label>

                <div class="image-upload">
                    <input type="file" id="productImage" accept="image/*">
                    <div class="image-preview" id="imagePreview">
                        <span>Upload Image</span>
                    </div>
                </div>
                
                <label>Product Name</label>
                <input type="text" placeholder="Enter product name">

                <label>Category</label>
                <select>
                    <option>Select Category</option>
                    <option>Category 1</option>
                    <option>Category 2</option>
                </select>

                <div class="flex-row">
                    <div>
                        <label>Price</label>
                        <input type="text" placeholder="Price">
                    </div>

                    <div>
                        <label>Stock</label>
                        <input type="text" placeholder="Stock">
                    </div>
                </div>

                <label>Description</label>
                <textarea placeholder="Product description"></textarea>

                <button class="submit-btn">Add Product</button>
            </div>
        </div>
    </div>

    <script src="../../static/js/admin/inventory.js"></script>
</body>
</html>
