<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sambast | Verify Email</title>
    <link rel="shortcut icon" type="image/png" href="{{ url_for('static', filename='image/logo.png') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/admin/verifyemail.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body class="auth-page">

    <div class="mobile-container">
        <header class="header">
            <img src="{{ url_for('static', filename='image/logo.png') }}" alt="Logo" class="logo">
            
            <a href="{{ url_for('admin_login_page') }}" class="back-btn">
                <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M15 18l-6-6 6-6"/>
                </svg>
            </a>
        </header>

        <main class="auth-content">
            <h1 class="main-title">VERIFY EMAIL</h1>

            <p class="instruction-text">
                Please enter the code we just sent to:<br>
                <span class="phone-number">juandelacruz@gmail.com</span>
            </p>

            <form class="auth-form" id="otp-form" method="POST" action="{{ url_for('verify_otp') }}">
                <div class="otp-container">
                    <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]*" required>
                    <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]*" required>
                    <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]*" required>
                    <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]*" required>
                    <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]*" required>
                    <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]*" required>
                </div>
                <input type="hidden" name="otp" id="otp-input">

                <div class="resend-container">
                    <p>Didn't received code?</p>
                    <button type="button" class="resend-btn">Resend Code</button>
                </div>

                <button type="submit" class="primary-btn">VERIFY</button>
            </form>
        </main>

        <footer class="auth-footer">
            <p style="font-size: 0.6rem; font-weight: 800; letter-spacing: 1px;">ORDER. TAP. DONE.</p>
        </footer>
    </div>

    <script>
        const form = document.getElementById('otp-form');
        const inputs = document.querySelectorAll('.otp-container input');
        const hiddenInput = document.getElementById('otp-input');

        // Auto-focus next input logic
        inputs.forEach((input, index) => {
            input.addEventListener('input', (e) => {
                if (e.target.value.length === 1 && index < inputs.length - 1) {
                    inputs[index + 1].focus();
                }
            });
            input.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' && !e.target.value && index > 0) {
                    inputs[index - 1].focus();
                }
            });
        });

        form.addEventListener('submit', (e) => {
            let otp = '';
            inputs.forEach(input => {
                otp += input.value;
            });
            hiddenInput.value = otp;
        });
    </script>
</body>
</html>
