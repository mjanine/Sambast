<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Shop Homepage</title>
    <link rel="stylesheet" href="../../static/css/user/shophomepage.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body class="shop-body">

    <div class="main-wrapper">
        <header class="shop-header">
            <h1 class="brand-logo">LOGO</h1>
            <div class="nav-actions">
                <div class="cart-wrapper" onclick="window.location.href='cart.html'">
                    <span class="cart-icon">🛒</span>
                    <span class="cart-badge" id="cartCount">0</span>
                </div>
                <img src="../../static/img/user/user-male-circle.png" 
                     class="user-avatar" 
                     alt="User" 
                     onclick="window.location.href='profile.html'">
            </div>
        </header>

        <section class="top-nav">
            <div class="search-container">
                <input type="text" placeholder="Search Product" id="productSearch" onkeyup="searchFn()">
                <span class="search-mag">🔍</span>
            </div>
            <div class="filter-bar">
                <button class="cat-pill active" onclick="filterFn('All', this)">All</button>
                <button class="cat-pill" onclick="filterFn('Category 1', this)">Category 1</button>
                <button class="cat-pill" onclick="filterFn('Category 2', this)">Category 2</button>
                <button class="cat-pill" onclick="filterFn('Category 3', this)">Category 3</button>
            </div>
        </section>

        <main class="scroll-container">
            <div class="item-grid" id="itemGrid"></div>
        </main>

        <footer class="bottom-bar">
            <div class="price-info">
                <p class="sub-text">Subtotal: <span id="subTotal">0000</span></p>
                <p class="discount-text">Total Discount: 0000</p>
            </div>
            <button class="checkout-trigger" onclick="window.location.href='checkout.html'">
                Check Out (<span id="btnQty">0</span>)
            </button>
        </footer>
    </div>

    <div id="statusModal" class="modal-overlay" style="display: none;">
    <div class="modal-content">
        <div class="modal-header">
            <h3>Order Status</h3>
            <button class="close-modal" onclick="closeStatusModal()">×</button>
        </div>
        <div class="modal-body">
            <div class="status-card">
                <p class="order-id-label">Order no.: <strong>00000000</strong></p>
                <div class="progress-tracker">
                    <div class="step active">
                        <span class="dot"></span>
                        <p>Order Placed</p>
                    </div>
                    <div class="step processing">
                        <span class="dot"></span>
                        <p>Preparing</p>
                    </div>
                    <div class="step">
                        <span class="dot"></span>
                        <p>Ready for Pick-up</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="../../static/js/user/shophomepage.js"></script>
</body>
</html>
