<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Check Out</title>
    <link rel="shortcut icon" type="image/png" href="{{ url_for('static', filename='image/logo.png') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/user/checkout.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body class="checkout-page">

    <div class="mobile-container">
        <header class="checkout-header">
            <a href="/cart" class="back-btn">
                <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M15 18l-6-6 6-6"/>
                </svg>
            </a>
            <h1 class="header-title">Check Out</h1>
        </header>

        <main class="checkout-content">
            <div class="info-card user-info">
                <h2 id="tempCustomerName">JUAN DELA CRUZ</h2>
                <p id="tempCustomerPhone">09123456789</p>
            </div>

            <div class="info-card products-container" id="checkoutList">
                </div>

            <div class="info-card order-no-box">
                <p>Order no.: <strong id="tempOrderNo">00000000</strong></p>
            </div>

            <div class="payment-section info-card" style="padding: 12px 16px;">
                <p style="font-weight:600; margin-bottom:8px;">PAYMENT METHOD</p>
                <label style="display:flex; align-items:center; gap:8px; margin-bottom:8px;">
                    <input type="radio" name="payment_method" value="cash" checked> Cash on Pickup
                </label>
                <label style="display:flex; align-items:center; gap:8px;">
                    <input type="radio" name="payment_method" value="gcash"> GCash (QR Code)
                </label>
            </div>
        </main>

        <footer class="checkout-footer">
            <div class="place-order-bar" id="placeOrderBtn">
                <span class="place-label">Place Order</span>
                <span class="total-label">total amount: <span id="finalTotal">0000</span></span>
            </div>
        </footer>
    </div>

    <script src="{{ url_for('static', filename='js/user/checkout.js') }}"></script>
</body>
</html>
