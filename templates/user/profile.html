<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Profile</title>
    <link rel="shortcut icon" type="image/png" href="../../static/image/logo.png">
    <link rel="stylesheet" href="../../static/css/user/profile.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body class="profile-body">

    <div class="main-wrapper">
        <header class="profile-header">
            <button class="back-btn" onclick="history.back()">
                <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M15 18l-6-6 6-6"/>
                </svg>
            </button>
            <h1 class="header-title">Profile</h1>
        </header>

        <main class="profile-content">
            <div class="input-group">
                <label>NAME</label>
                <div class="static-field">{{ user.name }}</div>
            </div>

            <div class="input-group">
                <label>CONTACT NO.</label>
                <div class="editable-field">
                    <span>{{ user.contact_no }}</span>
                    <button class="edit-icon" id="editContactBtn">
                        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"/>
                        </svg>
                    </button>
                </div>
            </div>

            <div class="pet-profile-section">
                <h2>PET PROFILE</h2>

                <div class="pet-profile-toolbar">
                    <div class="input-group pet-selector-group">
                        <label for="petSelector">SELECT PET</label>
                        <select id="petSelector" class="static-field pet-select"></select>
                    </div>
                    <button type="button" class="menu-btn add-pet-btn" id="addPetBtn">Add Another Pet</button>
                </div>
                
                <form id="petProfileForm">
                    <div class="input-group">
                        <label for="petName">NAME</label>
                        <input type="text" id="petName" name="name" class="static-field" placeholder="Enter pet's name" required>
                    </div>
                    <div class="input-group">
                        <label for="petSpecies">PET TYPE</label>
                        <input type="text" id="petSpecies" name="species" class="static-field" placeholder="e.g., Dog, Cat" required>
                    </div>
                    <div class="input-group">
                        <label for="petBreed">BREED</label>
                        <input type="text" id="petBreed" name="breed" class="static-field" placeholder="Enter breed" required>
                    </div>
                    <div class="input-group">
                        <label for="petAge">AGE (MONTHS)</label>
                        <input type="number" id="petAge" name="age_months" class="static-field" placeholder="Enter age" required>
                    </div>
                    <div class="input-group">
                        <label for="petWeight">WEIGHT (KG)</label>
                        <input type="number" step="0.1" id="petWeight" name="weight_kg" class="static-field" placeholder="Enter weight" required>
                    </div>
                    <button type="submit" class="menu-btn">Save Pet Profile</button>
                </form>
            </div>

            <div class="nav-menu">
                <button class="menu-btn" onclick="location.href='/change-pin'">
                    Change Password
                </button>
                <button class="menu-btn" onclick="location.href='/history'">
                    View Purchased History
                </button>
            </div>
        </main>

        <footer class="profile-footer">
            <button class="logout-btn" onclick="location.href='/sign-out'">LOG-OUT</button>
        </footer>
    </div>

    <script src="../../static/js/user/profile.js"></script>
</body>
</html>
