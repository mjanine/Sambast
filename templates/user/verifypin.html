<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sambast | Verify PIN</title>
    <link rel="stylesheet" href="../../static/css/user/verifypin.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body class="auth-page">

    <div class="mobile-container">
        <header class="header">
            <span class="logo">LOGO</span>
            <a href="/set-pin" class="back-btn">
                <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M15 18l-6-6 6-6"/>
                </svg>
            </a>
        </header>

        <main class="auth-content">
            <div class="text-group">
                <h1 class="main-title">Verify your 4-digit PIN</h1>
                <p class="sub-text">Please re-enter your PIN to confirm.</p>
            </div>

            {% with messages = get_flashed_messages() %}
              {% if messages %}
                <p style="color:red; font-size:0.8rem; text-align:center;">{{ messages[0] }}</p>
              {% endif %}
            {% endwith %}

            <form class="auth-form" action="/verify-pin" method="POST" id="verifyPinForm">
                <div class="pin-container">
                    <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]*" required>
                    <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]*" required>
                    <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]*" required>
                    <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]*" required>
                </div>
                <!-- Hidden field that verifypin.js fills before submit -->
                <input type="hidden" name="pin" id="pinValue">

                <button type="submit" class="primary-btn">CONFIRM</button>
            </form>
        </main>

        <footer class="auth-footer">
            <p>Have an account? <a href="/sign-in" class="accent-link">Sign-In</a></p>
        </footer>
    </div>

    <script src="../../static/js/user/verifypin.js"></script>
</body>
</html>
