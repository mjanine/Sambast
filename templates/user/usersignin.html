<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sambast | Sign-In</title>
    <link rel="stylesheet" href="../../static/css/user/usersignin.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body class="auth-page">

    <div class="mobile-container">
        <header class="header">
            <span class="logo">LOGO</span>
        </header>

        <main class="auth-content">
            <h1 class="main-title">Enter 4-digit PIN</h1>
            
            <p id="errorMessage" style="color:red; font-size:0.8rem; text-align:center; height: 1em;"></p>

            <form class="auth-form" action="/sign-in" method="POST" id="signInForm">
                <div class="input-field" style="margin-bottom: 16px;">
                    <input type="tel" name="contact_no" id="contactNo" placeholder="CONTACT NO." required>
                </div>

                <div class="pin-container">
                    <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]*" required>
                    <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]*" required>
                    <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]*" required>
                    <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]*" required>
                </div>
                <!-- Hidden field that usersignin.js fills before submit -->
                <input type="hidden" name="pin" id="pinValue">

                <button type="submit" class="primary-btn">SIGN-IN</button>

                <a href="#" class="forgot-link">Forgot PIN?</a>
            </form>
        </main>

        <footer class="auth-footer">
            <p>Don't have an account? <a href="/" class="accent-link">Create an account</a></p>
        </footer>
    </div>
<script src="{{ url_for('static', filename='js/user/usersignin.js') }}"></script>
</body>
</html>
