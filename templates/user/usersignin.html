<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sambast | Sign-In</title>
    <link rel="shortcut icon" type="image/png" href="{{ url_for('static', filename='image/logo.png') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/user/usersignin.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body class="auth-page">
<!-- ERROR MODAL -->
<div id="errorModal" class="modal-overlay">
    <div class="modal-box" role="dialog" aria-modal="true">

        <h2 class="modal-title">Error</h2>

        <p id="modalErrorText" class="modal-message">
            Something went wrong.
        </p>

        <button type="button" id="modalOkBtn" class="modal-btn">
            OK
        </button>

    </div>
</div>

    <div class="mobile-container">
        <header class="header">
            <img src="{{ url_for('static', filename='image/logo.png') }}" alt="Logo" class="logo-img">
        </header>

        <main class="auth-content">
            <h1 class="main-title">Enter 4-digit PIN</h1>
            
            <form class="auth-form" action="/sign-in" method="POST" id="signInForm">
                <div class="input-field" style="margin-bottom: 16px;">
                    <input type="tel" name="contact_no" id="contactNo" placeholder="CONTACT NO." required>
                </div>

                <div class="pin-container">
                    <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]*" autocomplete="one-time-code" required>
                    <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]*" autocomplete="one-time-code" required>
                    <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]*" autocomplete="one-time-code" required>
                    <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]*" autocomplete="one-time-code" required>
                </div>
                <input type="hidden" name="pin" id="pinValue">

                <button type="submit" class="primary-btn">SIGN-IN</button>

                <a href="{{ url_for('forgot_pin') }}" class="forgot-link">Forgot PIN?</a>
            </form>
        </main>

        <footer class="auth-footer">
            <p>Don't have an account? <a href="/" class="accent-link">Create an account</a></p>
        </footer>
    </div>

    <script src="{{ url_for('static', filename='js/user/usersignin.js') }}"></script>
</body>
</html>
