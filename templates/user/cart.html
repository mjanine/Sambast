<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Your Cart</title>
    <link rel="shortcut icon" type="image/png" href="../../static/image/logo.png">
    <link rel="stylesheet" href="../../static/css/user/cart.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
</head>

<body class="cart-page">

<div class="mobile-container">

    <!-- HEADER -->
    <header class="cart-header">
        <a href="/shop" class="back-btn">
            <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M15 18l-6-6 6-6"/>
            </svg>
        </a>

        <h1 class="header-title">Cart</h1>

        <button class="edit-btn" id="editBtn" onclick="toggleEditMode()">
            Edit
        </button>
    </header>

    <!-- CART ITEMS -->
    <main class="cart-items-list" id="cartList"></main>

    <!-- FOOTER -->
    <footer class="cart-footer">

        <!-- NORMAL MODE -->
        <div id="normalFooter" class="summary-info">
            <p class="subtotal-row">
                Subtotal: <span id="displaySubtotal">0000</span>
            </p>
            <p class="discount-row">
                Total Discount: <span id="displayDiscount">0000</span>
            </p>
        </div>

        <button id="checkoutBtn" class="checkout-btn">
            Check Out (<span id="selectedCount">0</span>)
        </button>

        <!-- EDIT MODE -->
        <div id="editFooter" class="edit-footer">

    <div class="edit-left">

    <label class="all-toggle">
        <input type="checkbox" id="selectAllCheckbox" onchange="toggleSelectAll(this)">
        All
    </label>

</div>


    <button type="button" class="remove-btn" onclick="removeSelected()">
        Remove
    </button>

</div>

    </footer>

</div>

<script src="../../static/js/user/cart.js"></script>

</body>
</html>
