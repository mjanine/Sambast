<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Order Status</title>
    <link rel="shortcut icon" type="image/png" href="../../static/image/logo.png">
    <link rel="stylesheet" href="../../static/css/user/progress.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body class="progress-body">

    <div class="main-wrapper">
        
        <header class="progress-nav">
            <a href="/shop" class="back-btn">
                <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M15 18l-6-6 6-6"/>
                </svg>
            </a>
            <button class="help-btn">Help</button>
        </header>

        <main class="scroll-content">
            <div class="status-main-card">
                <div class="time-info">
                    <h1 id="statusText">PREPARING</h1>
                    <p id="statusDesc">Your order is being prepared. We'll notify you when it's ready for pick-up!</p>
                </div>
                <div class="status-icon">📦</div>
            </div>

            <div class="details-section">
                <h3>Order Details</h3>
                <div id="orderItemsList"></div>

                <hr class="divider">

                <div class="detail-item">
                    <span>Order number</span>
                    <strong class="order-id" id="orderNoDisplay">#00000000</strong>
                </div>

                <div class="detail-item">
                    <span>Recipient</span>
                    <strong>{{ user.name if user else 'Customer' }}</strong>
                </div>

                <div class="detail-item">
                    <span>Contact Number</span>
                    <strong>{{ user.contact_no if user else 'N/A' }}</strong>
                </div>

                <hr class="divider">

                <div class="detail-item total-row">
                    <span>Total (Incl. TAX)</span>
                    <strong id="progressTotal">0000</strong>
                </div>
            </div>
        </main>

        <footer class="progress-footer">
            <button class="support-btn" id="backToShopBtn">Back to Shop</button>
        </footer>
    </div>

    <script src="../../static/js/user/progress.js"></script>
</body>
</html>
