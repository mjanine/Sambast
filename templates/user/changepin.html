<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sambast | Change PIN</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/user/changepin.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body class="auth-page">

    <div class="mobile-container">
        <header class="profile-header">
    <button class="back-btn" onclick="history.back()">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M15 18l-6-6 6-6"/>
        </svg>
    </button>
    <h1 class="header-title">Change PIN</h1>
</header>

        <main class="auth-content">
            <div class="text-group">
                <h1 class="main-title">Change your 4-digit PIN</h1>
                <p class="sub-text">For security, please enter your old and new PIN.</p>
            </div>

            <p id="errorMessage" style="color:red; font-size:0.8rem; text-align:center; height: 1em;"></p>

            <form class="auth-form" id="changePinForm">
                <label for="old_pin">Old PIN</label>
                <div class="pin-container" id="old_pin_container">
                    <input type="password" name="old_pin" maxlength="4" inputmode="numeric" pattern="[0-9]*" required>
                </div>

                <label for="new_pin">New 4-Digit PIN</label>
                <div class="pin-container" id="new_pin_container">
                    <input type="password" name="new_pin" maxlength="4" inputmode="numeric" pattern="[0-9]*" required>
                </div>

                <label for="confirm_pin">Confirm New PIN</label>
                <div class="pin-container" id="confirm_pin_container">
                    <input type="password" name="confirm_pin" maxlength="4" inputmode="numeric" pattern="[0-9]*" required>
                </div>

                <button type="submit" class="primary-btn">UPDATE PIN</button>
            </form>
        </main>

        <footer class="auth-footer">
        </footer>
    </div>

  <script src="{{ url_for('static', filename='js/user/changepin.js') }}"></script>
</body>
</html>
