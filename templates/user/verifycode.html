<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sambast | Verify Code</title>
    <link rel="shortcut icon" type="image/png" href="{{ url_for('static', filename='image/logo.png') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/user/verifycode.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body class="auth-page">

    <div class="mobile-container">
        <header class="header">
            <img src="{{ url_for('static', filename='image/logo.png') }}" alt="Logo" class="logo-img">
            
            <a href="/" class="back-btn">
                <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M15 18l-6-6 6-6"/>
                </svg>
            </a>
        </header>

        <main class="auth-content">
            <h1 class="main-title">VERIFY CODE</h1>
            <p class="instruction-text">
                Please enter the code we just sent to:<br>
                <span class="phone-number">{{ masked_email or 'your registered email' }}</span>
            </p>

            {% if error_message %}
            <p class="instruction-text" style="color: #ff4d4d; margin-top: -6px;">{{ error_message }}</p>
            {% endif %}

            <form class="auth-form" id="verifyOtpForm" action="/verify-otp" method="POST" data-otp-length="{{ otp_length or 6 }}">
                <div class="otp-container">
                    <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]*" required>
                    <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]*" required>
                    <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]*" required>
                    <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]*" required>
                    <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]*" required>
                    <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]*" required>
                </div>
                <input type="hidden" name="otp" id="otp-input">
                <p id="otpErrorMessage" class="instruction-text" style="color: #ff4d4d; min-height: 1.2em; margin-top: 6px;"></p>

                <div class="resend-container">
                    <p>Didn't receive code?</p>
                    <button type="button" class="resend-btn" id="resendOtpBtn" data-seconds-left="{{ resend_seconds_left or 0 }}">Resend Code</button>
                </div>

                <button type="submit" class="primary-btn">VERIFY</button>
            </form>
        </main>

        <footer class="auth-footer">
            <p>Have an account? <a href="/sign-in" class="accent-link">Sign-In</a></p>
        </footer>
    </div>
    <script src="{{ url_for('static', filename='js/user/verifycode.js') }}"></script>
</body>
</html>
