<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sambast | Set PIN</title>
    <link rel="shortcut icon" type="image/png" href="../../static/image/logo.png">
    <link rel="stylesheet" href="../../static/css/user/setpin.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body class="auth-page">

    <div class="mobile-container">
        <header class="header">
            <img src="../../static/image/logo.png" alt="Logo" class="logo-img">
            <span class="back-placeholder" style="visibility: hidden;">←</span>
        </header>

        <main class="auth-content">
            <div class="text-group">
                <h1 class="main-title">Set your 4-digit PIN</h1>
                <p class="sub-text">You'll use this to log-in.</p>
            </div>

            <p id="errorMessage" style="color:red; font-size:0.8rem; text-align:center; height: 1em;"></p>

            {% with messages = get_flashed_messages() %}
              {% if messages %}
                <p style="color:red; font-size:0.8rem; text-align:center;">{{ messages[0] }}</p>
              {% endif %}
            {% endwith %}

            <form class="auth-form" action="/set-pin" method="POST" id="setPinForm">
                <div class="pin-container">
                    <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]*" required>
                    <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]*" required>
                    <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]*" required>
                    <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]*" required>
                </div>
                <!-- Hidden field that setpin.js fills before submit -->
                <input type="hidden" name="pin" id="pinValue">

                <button type="submit" class="primary-btn">ENTER</button>
            </form>
        </main>

        <footer class="auth-footer">
            <p>Have an account? <a href="/sign-in" class="accent-link">Sign-In</a></p>
        </footer>
    </div>

  <script src="{{ url_for('static', filename='js/user/setpin.js') }}"></script>
</body>
</html>
